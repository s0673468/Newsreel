# Researchers to watch (flag articles by these authors — PURE GOLD tier marked)
researchers_to_watch:
  - name: Sebastian Raschka
    domain: LLM architecture, training recipes, ML engineering
    tier: pure_gold
  - name: Andrej Karpathy
    domain: LLM training, nanoGPT, AI education
    tier: pure_gold
  - name: Rhonda Patrick
    domain: APOE4 nutrition, DHA transport
  - name: Sally Frautschy
    domain: Longvida curcumin, neuroinflammation
  - name: Kyle Fish
    domain: AI welfare, Anthropic
  - name: Richard Sutton
    domain: RL, bitter lesson
  - name: Fiona Hill
    domain: Russia/Putin analysis

# Output preferences
output:
  format: markdown
  location: digests/
  naming: "YYYY-MM-DD.md"
  style: |
    - Lead with why it matters, not what happened
    - Include source links
    - Add "Personal relevance" callout when connecting to APOE4, stack compounds, or cognitive optimization
    - Add "Stack alert" callout for any research on watched supplements/medications
    - Keep each item to 3-5 sentences max
    - Group by topic with clear headers
    - Use programming/systems analogies in summaries where natural
    - End with "Deep Dive Candidates" section for papers worth reading in full
    - End with "Stack Watch" section if any supplement/pharma research was found
