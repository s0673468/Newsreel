# Newsreel Configuration
# Edit topics conversationally: "add longevity research" / "drop performance psychology"

# How many hours back to search (prevents stale results)
recency_hours: 48

# Maximum articles per topic (keeps digest scannable)
max_per_topic: 4

# Total digest target: ~20 items across all topics
max_total: 20

topics:
  # ── HIGH PRIORITY ─────────────────────────────────────────

  - name: APOE4 & Neurodegeneration
    description: >
      Research on APOE ε4/ε4 neuroprotection, Alzheimer's prevention, amyloid/tau pathology,
      BBB integrity, neuroinflammation, and dementia risk reduction. Mechanistic research preferred.
      Flag anything about APOE4-specific interventions, gene therapy, or biomarker advances.
    queries:
      - "APOE4 Alzheimer prevention research 2026"
      - "APOE4 blood-brain barrier neuroprotection"
      - "amyloid tau clearance APOE4 new study"
      - "dementia risk reduction intervention trial"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:nature.com
      - site:cell.com
      - site:arxiv.org
    priority: high

  - name: Supplement & Pharma Stack Research
    description: >
      New research on any substance in German's stack. Flag safety signals, interaction studies,
      new efficacy data, optimal dosing, or form comparisons. This is a watchlist — match against
      the specific compounds listed below.
    watchlist:
      medications:
        - telmisartan
        - nitrendipine
        - rosuvastatin
        - ezetimibe
        - dutasteride
        - lithium orotate
      supplements:
        - magnesium L-threonate (Magtein)
        - longvida curcumin
        - citicoline (CDP-choline)
        - NAC (N-acetyl cysteine)
        - creatine (cognitive/neuroprotection)
        - krill oil (phospholipid DHA)
        - selenium (selenomethionine)
        - CoQ10 (ubiquinone/ubiquinol)
        - HMB (beta-hydroxy beta-methylbutyrate)
        - ashwagandha KSM-66
        - vitamin D3
        - vitamin K2 MK-7
        - methylated B-complex
    queries:
      - "lithium orotate GSK-3β tau Alzheimer new study"
      - "magnesium threonate cognitive sleep research 2026"
      - "longvida curcumin neuroinflammation amyloid study"
      - "telmisartan neuroprotection PPARγ research"
      - "creatine neuroprotection brain ATP study"
      - "nitrendipine dementia calcium channel blocker"
      - "HMB PPARα hippocampal neuroprotection"
      - "ashwagandha KSM-66 BDNF cortisol research"
      - "citicoline acetylcholine SIRT1 cognitive study"
      - "NAC glutathione oxidative stress brain"
      - "rosuvastatin dementia risk statin neuroprotection"
      - "krill oil phospholipid DHA Mfsd2a BBB transport"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:nature.com
      - site:cell.com
      - site:examine.com
    priority: high

  - name: LLM Architecture & Training
    description: >
      Mechanistic deep dives into transformer design (MoE, MLA, NSA, value residuals),
      training dynamics (grokking, double descent, scaling laws, curriculum learning),
      optimizers (AdamW, Muon, SOAP, Sophia), and inference optimization (quantization,
      speculative decoding, KV-cache compression, distillation). Why choices work, not just what they are.
      Include major releases/announcements from ALL labs: Google, OpenAI, Anthropic, Meta,
      DeepSeek, Mistral, Alibaba/Qwen, xAI/Grok, Cohere, etc. Track model releases from
      non-Western labs (Qwen, DeepSeek, Yi) — licensing changes and benchmark claims matter.
      Include AI funding rounds, valuations, and IPO signals.
    queries:
      - "transformer architecture new design 2026"
      - "LLM training dynamics grokking scaling laws"
      - "sparse attention mechanism efficient transformer"
      - "optimizer LLM training Muon SOAP beyond AdamW"
      - "mixture of experts routing mechanism research"
      - "LLM quantization inference optimization memory reduction"
      - "speculative decoding KV cache compression research"
      - "Qwen DeepSeek new model release 2026"
      - "OpenAI Anthropic funding round valuation 2026"
    site_searches:
      - site:arxiv.org
      - site:substack.com
      - site:news.ycombinator.com
    priority: high

  - name: AI Agents & RL
    description: >
      Agentic AI systems, tool-use, multi-agent patterns, and RL applied to real-world agents.
      Interested in training dynamics (information density, pass-rate-dependent learning)
      and the bitter lesson applied to agents. Skip product launches.
    queries:
      - "AI agent framework tool use research 2026"
      - "reinforcement learning real world agent training"
      - "multi-agent LLM coordination patterns"
      - "Claude agent SDK agentic coding patterns"
    site_searches:
      - site:arxiv.org
      - site:substack.com
      - site:news.ycombinator.com
    priority: high

  - name: AI Tools & Developer Community
    description: >
      The tools German uses daily: Claude Code, Cursor, Codex, GitHub Copilot, Windsurf, etc.
      Track: leaks/reverse-engineering of how they work under the hood, system prompts leaked,
      quota/billing changes and bugs, limits resets, new features, community drama, and
      practitioner discussions about workflows and patterns. Also covers AI coding benchmarks,
      developer experience debates, and "how X actually works" deep dives.
      This is the watercooler — what developers are talking about TODAY.
    queries:
      - "Claude Code leaked system prompt how it works"
      - "Claude Code quota drain bug discussion"
      - "Codex limits reset OpenAI update"
      - "AI coding assistant news Cursor Copilot Windsurf"
      - "Claude Code Anthropic developer update"
    site_searches:
      - site:news.ycombinator.com
      - site:reddit.com
      - site:substack.com
      - site:x.com
    priority: high

  - name: AI Technical Discourse (X & Substack)
    description: >
      The pulse of what ML practitioners and researchers are actually discussing on X (Twitter)
      and Substack. Includes: hot takes on new papers, architecture debates, training recipes,
      prompt engineering insights, scaling law discussions, benchmark drama, and "what I learned
      building X" posts. Prioritize content from Sebastian Raschka, Andrej Karpathy, and other
      watched researchers. This topic is about the CONVERSATION, not just the papers — the
      interpretations, disagreements, and implications that practitioners care about.
    queries:
      - "Sebastian Raschka blog newsletter 2026"
      - "Andrej Karpathy post blog 2026"
      - "AI ML discussion trending Twitter X March April 2026"
      - "LLM debate discussion substack newsletter 2026"
      - "machine learning hot take trending discussion"
    site_searches:
      - site:sebastianraschka.com
      - site:magazine.sebastianraschka.com
      - site:karpathy.ai
      - site:substack.com
      - site:news.ycombinator.com
    priority: high

  - name: APOE4 Precision Nutrition
    description: >
      Foods and dietary patterns specifically relevant to APOE4/4 carriers — BBB-protective foods,
      anti-inflammatory nutrition, MIND/Mediterranean diet research, and genotype-specific metabolic responses.
      Interested in mechanisms (oleocanthal, sulforaphane, polyphenols) not generic diet tips.
    queries:
      - "APOE4 diet Mediterranean MIND neuroprotection study"
      - "EVOO oleocanthal blood-brain barrier research"
      - "sulforaphane broccoli neuroprotection NRF2 study"
      - "polyphenols flavonoids neurodegeneration APOE4"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:nature.com
      - site:examine.com
    priority: high

  - name: Sleep & Circadian Biology
    description: >
      Sleep architecture optimization, circadian rhythm research, sleep fragmentation mechanisms,
      and interventions. Interested in mechanistic explanations (cortisol, GABA, adenosine)
      and wearable-tracked metrics. Skip generic sleep hygiene.
    queries:
      - "sleep architecture deep sleep optimization research"
      - "circadian rhythm disruption health consequences study"
      - "sleep fragmentation cortisol HRV research"
      - "GABA sleep supplements magnesium mechanism"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:nature.com
      - site:substack.com
    priority: high

  # ── MEDIUM PRIORITY ───────────────────────────────────────

  - name: Algorithmic Trading & Quant Finance
    description: >
      Systematic trading strategies, regime detection, market microstructure, and quantitative
      approaches to emerging markets. Interested in MOEX, B3/Bovespa, Bitcoin regime shifts,
      and ML applied to finance. Academic or practitioner research, not financial news.
    queries:
      - "algorithmic trading regime detection research"
      - "market microstructure emerging markets systematic"
      - "Bitcoin regime shift mean reversion momentum"
      - "ML quantitative finance new strategy paper"
    site_searches:
      - site:arxiv.org
      - site:substack.com
      - site:ssrn.com
    priority: medium

  - name: Exercise Science & Recovery
    description: >
      Training science relevant to BJJ, surfing, and general fitness — periodization,
      Zone 2 physiology, recovery protocols, injury prevention, and heat therapy (HSP induction).
      Prefer research on athletes over general population.
    queries:
      - "exercise science periodization combat sports research"
      - "Zone 2 cardio mitochondrial adaptation study"
      - "heat therapy HSP70 protein misfolding recovery"
      - "BJJ injury prevention strength conditioning research"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:substack.com
    priority: medium

  - name: Performance Psychology & Habit Adherence
    description: >
      Two sub-topics, both high-signal:
      1. PERFORMANCE PSYCHOLOGY — Mental models for consistency, deliberate practice,
         pre-performance routines, self-regulation under pressure, flow states,
         psychological flexibility (ACT), and cognitive reappraisal. Applied to athletes,
         traders, and knowledge workers. Prefer frameworks with mechanisms.
      2. HABIT ADHERENCE — The meta-skill: how to stick with diets, study plans, supplement
         stacks, training programs. Implementation intentions (IF-THEN), identity-based habits,
         self-monitoring science, temptation bundling, commitment devices, flexible vs rigid
         scheduling, and environment design. Peer-reviewed or applied behavioral science.
      Interested in: maintenance (not just initiation), failure modes, consistency over time,
      and systems-level models. Skip self-help fluff.
    queries:
      - "performance psychology consistency deliberate practice 2026"
      - "mental toughness self-regulation athletes research"
      - "behavior maintenance adherence long-term study 2026"
      - "implementation intentions flexible IF-THEN meta-analysis"
      - "identity-based habit formation self-concept adherence"
      - "self-monitoring tracking goal attainment research"
      - "psychological flexibility ACT performance outcomes"
      - "pre-performance routine cognitive reappraisal study"
      - "temptation bundling commitment device intervention"
      - "diet adherence compliance behavioral intervention"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:substack.com
      - site:news.ycombinator.com
      - site:psychologytoday.com
    priority: high

  - name: Behavioral Science & Systems Thinking
    description: >
      Behavioral economics, game theory, systems design for behavior change,
      decision-making under uncertainty. Prefer peer-reviewed or applied science
      over self-help. Includes infinite games (Carse).
    queries:
      - "behavioral economics decision making research 2026"
      - "systems thinking behavior design environment"
      - "habit formation neuroscience dopamine reward research"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:substack.com
      - site:news.ycombinator.com
    priority: medium

  - name: Russia Sanctions & Policy
    description: >
      Track US/EU sanctions changes on Russia — additions, removals, carve-outs, enforcement shifts.
      Not the war analysis (quality too low in English), but policy moves that affect MOEX/IMOEX
      trading, RUB, and the broader sanctions architecture. Include secondary sanctions enforcement
      and any easing signals.
    queries:
      - "Russia sanctions update easing removal 2026"
      - "US Russia sanctions policy change 2026"
      - "MOEX sanctions trading access update"
    site_searches:
      - site:reuters.com
      - site:bloomberg.com
      - site:foreignpolicy.com
    priority: medium

  - name: AI Consciousness & Alignment
    description: >
      Whether frontier LLMs might have experience (Butlin et al. indicators),
      Anthropic's precautionary approach to AI welfare, and alignment research.
      Philosophical depth preferred over hot takes.
    queries:
      - "AI consciousness indicators neuroscience theory 2026"
      - "AI welfare precautionary approach Anthropic"
      - "LLM alignment research safety new paper"
    site_searches:
      - site:arxiv.org
      - site:substack.com
    priority: medium

  - name: Prediction Markets & Geopolitical Odds
    description: >
      Track significant shifts in prediction market odds on geopolitical events, wars,
      elections, and policy outcomes. Sources: Polymarket, Metaculus, Kalshi, PredictIt.
      Focus on LARGE moves (>10pp shifts) or odds crossing key thresholds (e.g., >50%).
      Events to watch: Iran war ceasefire/escalation timelines, Strait of Hormuz reopening,
      US ground invasion odds, Russia-Ukraine developments, US elections, AI regulation.
      Report the odds change and what likely drove it — not just the number.
    queries:
      - "Polymarket Iran war odds ceasefire 2026"
      - "prediction market geopolitical odds shift 2026"
      - "Polymarket Kalshi Metaculus trending bet 2026"
      - "Strait of Hormuz reopening odds prediction market"
      - "prediction market US election 2026 midterms odds"
    site_searches:
      - site:polymarket.com
      - site:metaculus.com
      - site:kalshi.com
      - site:substack.com
    priority: medium

  - name: Markets Overview
    description: >
      Daily market snapshot: price movements and key drivers for US (S&P 500, Nasdaq, Dow),
      Europe (STOXX 600, DAX), Brazil (Ibovespa, BRL), and Russia (MOEX/IMOEX, RUB).
      Include commodities (oil, iron ore) when they drive EM moves.
      Focus on what moved and why, not predictions. Always included in digest.
    queries:
      - "stock market today S&P 500 Nasdaq"
      - "European stock market STOXX DAX today"
      - "Ibovespa Brazil stock market today"
      - "MOEX IMOEX Russian stock market today"
    priority: always

  - name: News Radar
    description: >
      Two layers:
      1. INTERESTING STORIES — Tech drama, wild schemes, audacious moves, surprising developments.
         Things like "$2.5B GPU smuggling with a hair dryer" or "OpenAI acquires the Python toolchain."
         Prioritize stories with narrative weight — conflict, irony, scale, cleverness, or consequences.
         Include gaming industry (Nintendo, Steam, console wars), space, hardware, developer tools.
      2. BIG EVENTS — Anything so significant it would be irresponsible to skip, even if it's outside
         core interests. Wars starting/ending, major natural disasters, landmark legislation,
         historic firsts, market crashes. The "everyone is talking about this" filter.
      Include 4-6 items per digest. Skip: celebrity gossip, sports scores, generic earnings,
      routine product updates, and PR fluff. If unsure, ask: "would German bring this up at dinner?"
      ALSO COVER:
      - Quantum computing breakthroughs (especially crypto/encryption implications)
      - Major entertainment releases (films, series premieres on Netflix/streaming — not reviews, just "it's out")
      - AI company funding rounds, valuations, M&A
      - Sanctions policy shifts (Russia, China, Iran)
      - Hardware launches (chips, GPUs, consoles)
    queries:
      - "tech news today biggest stories"
      - "science breakthrough news today"
      - "gaming news today Nintendo Steam"
      - "world news today major developments"
      - "developer tools open source news today"
      - "space launch satellite news today"
      - "streaming film Netflix box office entertainment news today"
      - "quantum computing breakthrough news 2026"
      - "Netflix new release premiere today"
      - "AI funding round valuation news today"
    site_searches:
      - site:arstechnica.com
      - site:theverge.com
      - site:news.ycombinator.com
      - site:reuters.com
      - site:tomshardware.com
      - site:variety.com
      - site:deadline.com
      - site:reddit.com
    priority: always

  # ── LOW PRIORITY (include if space allows) ────────────────

  - name: X/Twitter Growth & Content Strategy
    description: >
      Growing a technical/ML account from zero — algorithm mechanics, Premium visibility,
      engagement tactics for niche content. Data-driven approaches preferred.
    queries:
      - "X Twitter growth strategy technical account 2026"
      - "Twitter algorithm visibility engagement analysis"
    site_searches:
      - site:substack.com
    priority: low

  - name: Spaced Repetition & Learning Science
    description: >
      Anki card design, desirable difficulties, optimal study session structure,
      and cognitive fatigue research. Applied to technical/mathematical content.
    queries:
      - "spaced repetition research optimal scheduling 2026"
      - "desirable difficulties active recall learning study"
    site_searches:
      - site:pubmed.ncbi.nlm.nih.gov
      - site:substack.com
    priority: medium

# Personal context for relevance filtering
personal_context: |
  APOE4 ε4/ε4 homozygous — highest-risk genotype for Alzheimer's and cardiovascular disease.
  Also carries 9p21 (cardiovascular), TCF7L2 & FTO (T2D predisposition), IL-6 G/G (inflammation).
  On: telmisartan, nitrendipine, rosuvastatin, ezetimibe, dutasteride, lithium orotate.
  Extensive supplement stack — see watchlist in "Supplement & Pharma Stack Research" topic.
  Zero alcohol (permanent), zero nicotine (quit Mar 2025), zero iron supplementation.
  Systems thinker — prefer frameworks, mechanisms, and IF-THEN protocols over tips.
  Quantified self: Garmin (sleep, HRV, steps), health dashboard, daily logs.
  Active: BJJ, surfing, kickboxing, Zone 2 cardio, lifting.
  Learning: ML/deep learning fundamentals, Anki-based spaced repetition.
  Trades: IMOEX2 futures (algorithmic), exploring B3/Bovespa and Bitcoin systematic strategies.
  Wants mechanistic explanations — pathways, not just "it works."
  Programming/systems analogies are the preferred explanatory framework.

